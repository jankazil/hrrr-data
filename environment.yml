name: hrrr-data
channels:
  - conda-forge
dependencies:
  - python>=3.12
  - pip
  - setuptools
  - wheel
  - mamba

  # Runtime dependencies mirrored from pyproject.toml.
  - cartopy
  - matplotlib
  - ncl
  - numpy
  - netcdf4
  - pygrib
  - requests
  - s3fs
  - xarray

  # Non-Python/runtime tools used by the project environment.
  - ncl

  # Development tooling.
  - pytest
  - pytest-cov
  - ruff
  - pre-commit

  # Jupyter support.
  - jupyter_client
  - jupyter_core
  - notebook
  - ipykernel
